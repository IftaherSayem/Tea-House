<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <title>Tea House</title>
</head>
<body class="font-['Manrope']">
    <section class="grid grid-cols-1 md:grid-cols-2 container mx-auto px-6">
        <div class="space-y-[30px]">
            <h1 class="font-extrabold text-[80px]/[100px]">It's good<br> tea time at The<br> Tea House</h1>
            <p class="text-[#777777] text-[18px]/[30px] font-medium">Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your Taste Buds.</p>
            <button class="bg-linear-to-r from-[#FF0000] to-[#FF8938] text-white font-bold text-[20px] py-[18px] px-[20px] rounded-md hover:cursor-pointer">Explore More <i class="fa-solid fa-arrow-right -rotate-45"></i></button>
        </div>
        <div class="flex justify-end items-center relative">
            <img src="images/banner.png" alt="" srcset="" class="flex justify-end items-end">
            <div class="bg-white rounded-2xl shadow-2xl flex justify-between items-center absolute bottom-3 left-[180px] py-[18px] px-[26px]">
                <img src="images/rating.png" alt="" srcset="">
                <div class="">
                    <h2 class="text-4xl font-extrabold">5.00</h2>
                    <p class="font-semibold text-[#777777]">Trust Pilot Ratings</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
